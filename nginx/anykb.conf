# AnyKB nginx — HTTPS on :443, HTTP :80 redirects + ACME challenge passthrough.
# SSE-safe `/api/chat` (no buffering, long timeouts).

upstream anykb_backend {
    server backend:8000;
}

upstream anykb_frontend {
    server frontend:3000;
}

# ---------- :80 — ACME challenges + redirect-to-HTTPS ----------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name anykb.cc.cd _;

    # Let certbot --webroot renewals reach /var/www/certbot/.well-known/
    # without ever taking nginx down.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- :443 — actual app, terminated TLS ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name anykb.cc.cd;

    # ----- TLS -----
    ssl_certificate     /etc/letsencrypt/live/anykb.cc.cd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anykb.cc.cd/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — once you visit over HTTPS, browser refuses HTTP for 1 year.
    # Comment this out during initial debugging if you want HTTP back temporarily.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # KB file uploads (pdf / docx) can be 10-50 MB.
    client_max_body_size 60M;

    # Forward real client info to backend (FastAPI behind --proxy-headers).
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- SSE: streaming chat endpoint must NOT buffer ---
    location = /api/chat {
        proxy_pass http://anykb_backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
        proxy_set_header Connection "";
    }

    # --- All other backend API ---
    location /api/ {
        proxy_pass http://anykb_backend;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://anykb_backend/health;
    }

    # --- Frontend (Next.js) ---
    location / {
        proxy_pass http://anykb_frontend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
